spring:
  application:
    name: api
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:job_radar}
    username: ${DB_USER:job_radar}
    password: ${DB_PASSWORD:job_radar}

server:
  port: 8083

api:
  cors:
    allowed-origins: ${API_CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
