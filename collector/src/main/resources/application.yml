spring:
  application:
    name: collector
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:job_radar}
    username: ${DB_USER:job_radar}
    password: ${DB_PASSWORD:job_radar}
  flyway:
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never

collector:
  scan:
    tick-interval-millis: 300000
    jitter-seconds: 300
    user-agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36 job-radar/0.1"
    request-interval-millis: 1000
    # 台灣時間活躍掃描時段（24 小時制，含頭不含尾），避開半夜這種不自然的流量模式，
    # 降低被平台判定為機器人的風險（見 ScanScheduler 的說明）
    active-hours-start: 8
    active-hours-end: 23
