# 需要的 CI/CD 變數（GitLab project Settings > CI/CD > Variables）：
#   K8S_REPO_URL          - k8s repo 的 clone URL（含認證，或搭配 deploy token）
#   K8S_REPO_DEPLOY_TOKEN - 有 write 權限的 GitLab deploy token / PAT
# CI_REGISTRY / CI_REGISTRY_USER / CI_REGISTRY_PASSWORD / CI_REGISTRY_IMAGE 由 GitLab 自動注入（見 architecture.md D9）。

stages:
  - test
  - build
  - package
  - deploy

# Runner 只接有打 "k8s" tag 的 job（見 runner 設定 run_untagged: false），
# 用 default 讓所有 job 統一繼承，不用每個 job 各自重複
default:
  tags:
    - k8s

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

.gradle-cache:
  cache:
    key: gradle-cache
    paths:
      - .gradle/wrapper
      - .gradle/caches

test:
  stage: test
  image: docker.io/library/eclipse-temurin:21-jdk
  extends: .gradle-cache
  script:
    # 部分測試靠 Testcontainers 起真的 Postgres（見各測試類別的 @Tag("requires-docker")），
    # 但 Runner 用 Kubernetes executor 執行 job（container runtime 是 containerd，job pod 內
    # 沒有 Docker daemon 可用），這些測試會直接連不上 Docker 失敗。要支援需要幫 Runner 開
    # Docker-in-Docker + privileged 模式（影響這個共用 Runner 的安全邊界，不只 job-radar 一個
    # 專案的事），目前先跳過，這些測試仍在本機（有 Docker）手動跑。
    - ./gradlew test -PskipDockerTests --console=plain
  artifacts:
    when: always
    reports:
      junit:
        - "*/build/test-results/test/TEST-*.xml"

build:
  stage: build
  image: docker.io/library/eclipse-temurin:21-jdk
  extends: .gradle-cache
  script:
    - ./gradlew :collector:bootJar :worker:bootJar :api:bootJar --console=plain
  artifacts:
    paths:
      - collector/build/libs/*.jar
      - worker/build/libs/*.jar
      - api/build/libs/*.jar
    expire_in: 1 hour

build:frontend:
  stage: build
  image: docker.io/library/node:20-alpine
  cache:
    key: npm-cache
    paths:
      - frontend/node_modules
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

.package:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs: ["build"]
  script:
    - mkdir -p /kaniko/.docker
    - >
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}"
      > /kaniko/.docker/config.json
    # registry.192.168.100.200.nip.io 是 homelab 自己簽的內部 PKI（見 architecture.md），
    # kaniko 這個 image 沒有這張 Root CA，直接推會 x509 驗證失敗。用
    # --registry-certificate 明確告訴 kaniko 這個 host 要信哪張憑證（$HOMELAB_CA_CERT 是
    # CI/CD file 類型變數，值就是 Root CA 的 PEM）。
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/$SERVICE/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/$SERVICE:$CI_COMMIT_SHORT_SHA"
      --destination "$CI_REGISTRY_IMAGE/$SERVICE:latest"
      --registry-certificate "$CI_REGISTRY=$HOMELAB_CA_CERT"

package:collector:
  extends: .package
  variables:
    SERVICE: collector

package:worker:
  extends: .package
  variables:
    SERVICE: worker

package:api:
  extends: .package
  variables:
    SERVICE: api

package:frontend:
  extends: .package
  needs: ["build:frontend"]
  variables:
    SERVICE: frontend

deploy:update-image-tags:
  stage: deploy
  image: docker.io/alpine/git:latest
  needs: ["package:collector", "package:worker", "package:api", "package:frontend"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    # alpine/git 這個 image 一樣不認得 homelab 的內部 CA（見 kaniko 那步的說明），
    # git clone gitlab.192.168.100.200.nip.io 會 x509 驗證失敗，先裝進系統信任庫。
    # 這個 image 沒有預裝 ca-certificates 套件（update-ca-certificates 用到的目錄
    # 不存在），要先裝。
    - apk add --no-cache ca-certificates
    - cp "$HOMELAB_CA_CERT" /usr/local/share/ca-certificates/homelab-root-ca.crt
    - update-ca-certificates
    # K8S_REPO_DEPLOY_TOKEN 是 homelab/k8s 專案自己的 Project Access Token（write_repository），
    # 不是 $CI_JOB_TOKEN，所以用 oauth2 當 username，不是 gitlab-ci-token 那個保留字。
    - git clone "https://oauth2:${K8S_REPO_DEPLOY_TOKEN}@${K8S_REPO_URL}" k8s-repo
    - cd k8s-repo/apps/job-radar
    - 'sed -i "s#image: .*/collector:.*#image: ${CI_REGISTRY_IMAGE}/collector:${CI_COMMIT_SHORT_SHA}#" collector.yaml'
    - 'sed -i "s#image: .*/worker:.*#image: ${CI_REGISTRY_IMAGE}/worker:${CI_COMMIT_SHORT_SHA}#" worker.yaml'
    - 'sed -i "s#image: .*/api:.*#image: ${CI_REGISTRY_IMAGE}/api:${CI_COMMIT_SHORT_SHA}#" api.yaml'
    - 'sed -i "s#image: .*/frontend:.*#image: ${CI_REGISTRY_IMAGE}/frontend:${CI_COMMIT_SHORT_SHA}#" frontend.yaml'
    - git config user.email "ci@job-radar.local"
    - git config user.name "job-radar CI"
    - 'git commit -am "deploy: job-radar ${CI_COMMIT_SHORT_SHA}"'
    - git push origin HEAD:main
