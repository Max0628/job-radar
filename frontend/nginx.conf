server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # api 不對外曝露，走叢集內部 Service DNS 轉發，同源請求不用碰 CORS
    # （見 frontend/.env 的 VITE_JSON_SERVER_URL=/api，跟本機開發用 vite.config.ts
    # 的 proxy 設定是同一個設計決策，這裡是它在 production 的對應實作）
    #
    # proxy_pass 的目標網址用變數（$api_upstream）而不是寫死字串，是刻意的：nginx
    # 對寫死字串的 proxy_pass 只在「啟動當下」解析一次 DNS，解析失敗 nginx 直接
    # 拒絕啟動、永久 crash loop（本機測試就先炸過一次）。改用變數 + resolver 指令，
    # 讓 nginx 在每次真的有請求進來時才動態查 DNS，容忍 pod 剛啟動、DNS 還沒 ready
    # 的短暫時間差。10.96.0.10 是這個 cluster 的 kube-dns Service ClusterIP。
    location /api/ {
        resolver 10.96.0.10 valid=10s;
        set $api_upstream http://api.job-radar.svc.cluster.local:8083;
        # proxy_pass 用變數時，nginx 不會像用字串那樣自動把 location 匹配到的路徑接上去，
        # 一定要靠 $request_uri 自己把完整原始路徑（含 query string）補回去，
        # 不然所有請求都會被送到寫死的 /api/，路徑跟參數整個消失（實測發現：/api/jobs
        # 進來，後端收到的變成 /api/）
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
